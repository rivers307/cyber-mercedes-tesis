{% extends 'base.html' %}

{% block title %}Nuevo Insumo - Cyber Mercedes{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="mb-3">
        <a href="{% url 'lista_insumos' %}" class="btn btn-secondary">
            ← Volver
        </a>
    </div>

    <div class="card">
        <div class="card-header bg-success text-white">
            <h4><i class="bi bi-plus-circle"></i> Nuevo Insumo</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nombre *</label>
                        <input type="text" name="nombre" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Categoría</label>
                        <select name="categoria" class="form-select">
                            <option value="">Seleccionar categoría</option>
                            {% for cat in categorias %}
                            <option value="{{ cat.id }}">{{ cat.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Unidad *</label>
                        <select name="unidad" class="form-select" required>
                            <option value="unidad">Unidad</option>
                            <option value="docena">Docena</option>
                            <option value="paquete">Paquete</option>
                            <option value="metro">Metro</option>
                            <option value="litro">Litro</option>
                            <option value="gramo">Gramo</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Stock Inicial *</label>
                        <input type="number" name="stock_actual" class="form-control" value="0" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Stock Mínimo *</label>
                        <input type="number" name="stock_minimo" class="form-control" value="5" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Precio Unitario (Bs)</label>
                        <input type="number" step="0.01" name="precio_unitario" class="form-control" value="0">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Proveedor</label>
                        <input type="text" name="proveedor" class="form-control">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Ubicación</label>
                        <input type="text" name="ubicacion" class="form-control" placeholder="Ej: Estante A, Fila 3">
                    </div>
                </div>

                <button type="submit" class="btn btn-success">
                    <i class="bi bi-save"></i> Guardar Insumo
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
