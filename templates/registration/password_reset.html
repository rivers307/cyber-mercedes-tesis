{% load static %}
<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Recuperar Contraseña | Cyber Comunal Mercedes</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .login-bg {
            background: radial-gradient(ellipse at top, #1a0b2e, #0a0510);
        }
        .glass-card {
            background: rgba(17, 12, 29, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(157, 80, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .neon-purple-gradient {
            background: linear-gradient(135deg, #7c3aed 0%, #9d50ff 100%);
        }
        .input-field {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(157, 80, 255, 0.2);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #9d50ff;
            box-shadow: 0 0 0 2px rgba(157, 80, 255, 0.3);
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7c3aed 0%, #9d50ff 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(125, 0, 255, 0.4);
        }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center p-4">
    <div class="glass-card rounded-2xl p-8 max-w-md w-full">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl neon-purple-gradient flex items-center justify-center mx-auto shadow-lg shadow-purple-500/20">
                <span class="material-symbols-outlined text-white text-3xl">lock_reset</span>
            </div>
            <h2 class="text-2xl font-bold text-white mt-4">¿Olvidaste tu contraseña?</h2>
            <p class="text-white/40 text-sm mt-2">
                Ingresa tu correo electrónico y te enviaremos un enlace para restablecerla.
            </p>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="bg-red-500/10 border border-red-500/20 rounded-xl p-3 text-sm text-red-400">
                    {{ form.email.errors.0 }}
                </div>
            {% endif %}

            <div>
                <label for="id_email" class="block text-sm font-medium text-white/60 mb-1.5">Correo Electrónico</label>
                <input type="email" name="email" id="id_email" 
                       class="w-full input-field rounded-xl px-4 py-3 text-white placeholder-white/30"
                       placeholder="ejemplo@correo.com" required>
            </div>

            <button type="submit" 
                    class="w-full btn-primary text-white py-3 rounded-xl font-medium transition-all hover:shadow-lg hover:shadow-purple-500/25">
                Enviar enlace de recuperación
            </button>
        </form>

        <div class="text-center mt-6">
            <a href="{% url 'login' %}" class="text-white/40 hover:text-purple-400 text-sm transition-colors flex items-center justify-center gap-1">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Volver al inicio de sesión
            </a>
        </div>
    </div>
</body>
</html>
