{% load static %}
<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Contraseña Actualizada | Cyber Comunal Mercedes</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .login-bg {
            background: radial-gradient(ellipse at top, #1a0b2e, #0a0510);
        }
        .glass-card {
            background: rgba(17, 12, 29, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(157, 80, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .neon-purple-gradient {
            background: linear-gradient(135deg, #7c3aed 0%, #9d50ff 100%);
        }
        .btn-primary {
            background: linear-gradient(135deg, #7c3aed 0%, #9d50ff 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(125, 0, 255, 0.4);
        }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center p-4">
    <div class="glass-card rounded-2xl p-8 max-w-md w-full text-center">
        <div class="w-16 h-16 rounded-2xl bg-green-500/20 flex items-center justify-center mx-auto mb-4">
            <span class="material-symbols-outlined text-green-400 text-3xl">verified</span>
        </div>
        
        <h2 class="text-2xl font-bold text-white">¡Contraseña actualizada!</h2>
        <p class="text-white/40 text-sm mt-2">
            Tu contraseña ha sido cambiada exitosamente.
            Ahora puedes iniciar sesión con tu nueva contraseña.
        </p>

        <a href="{% url 'login' %}" 
           class="btn-primary text-white px-6 py-2.5 rounded-xl inline-block mt-6 text-sm font-medium">
            Iniciar Sesión
        </a>
    </div>
</body>
</html>
