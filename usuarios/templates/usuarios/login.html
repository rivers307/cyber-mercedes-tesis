<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Mercedes - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a472a 0%, #0d2818 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
        }
        .login-header {
            background: #2c5f2d;
            color: white;
            text-align: center;
            padding: 30px;
        }
        .login-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .login-header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .login-body {
            padding: 40px;
        }
        .login-body h3 {
            color: #2c5f2d;
            margin-bottom: 20px;
        }
        .btn-success {
            background-color: #2c5f2d;
            border: none;
        }
        .btn-success:hover {
            background-color: #1e451f;
        }
        .error-message {
            background: #fee;
            color: #c00;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1>🖥️ Cyber Comunal</h1>
            <p>NUESTRA SEÑORA DE LAS MERCEDES</p>
        </div>
        
        <div class="login-body">
            <h3 class="text-center">Ingreso al Sistema</h3>
            <p class="text-center text-muted mb-4">Ingrese sus credenciales</p>
            
            {% if form.errors %}
                <div class="error-message">
                    Usuario o contraseña incorrectos
                </div>
            {% endif %}
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2">
                    Iniciar Sesión →
                </button>
            </form>
            
            <div class="text-center mt-4">
                <small class="text-muted">
                    Portal de acceso seguro protegido por autenticación cifrada
                </small>
            </div>
        </div>
        
        <div class="bg-light text-center py-3">
            <small>© 2024 NUESTRA SEÑORA DE LAS MERCEDES</small>
        </div>
    </div>
</body>
</html>
